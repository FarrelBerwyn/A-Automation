<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A-Automation</title>
  <script>
    // Redirect SPA 404s to index.html with hash routing
    var pathName = window.location.pathname;
    var basePath = '/A-Automation/';
    var pathSegments = pathName.replace(basePath, '').split('/').filter(Boolean);
    var route = pathSegments.length ? '/' + pathSegments.join('/') : '/';
    
    // Save the intended route and redirect
    window.location.replace(basePath + '#' + route);
  </script>
</head>
<body>
</body>
</html>
